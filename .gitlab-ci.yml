autopilot:
  stage: build
  image: baselinews/paradrone:platformio
  script:
    - cd autopilot
    - pio lib update
    - pio run
  cache:
    key: pio-deps
    paths:
      - .pio/libdeps

autopilot-test:
  stage: test
  image: baselinews/paradrone:platformio
  script:
    - cd autopilot
    - pio lib update
    - pio test -e native
  cache:
    key: pio-deps
    paths:
      - .pio/libdeps

rc:
  stage: build
  image: baselinews/paradrone:platformio
  script:
    - cd remotecontrol
    - pio lib update
    - pio run
  cache:
    key: pio-deps
    paths:
      - .pio/libdeps

simulator:
  stage: build
  image: node:14-slim
  script:
    - cd simulator
    - npm i
    - node_modules/typescript/bin/tsc

simulator-lint:
  stage: test
  image: node:14-slim
  script:
    - cd simulator
    - npm i
    - node_modules/tslint/bin/tslint --project .

simulator-mocha:
  stage: test
  image: node:14-slim
  script:
    - cd simulator
    - npm i
    - npm test
